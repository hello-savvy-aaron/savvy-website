<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!--
      OG card template — rendered to /assets/og.png at exactly 1200x630.
      Regenerate after edits:
        curl -sL "https://api.microlink.io/?url=https%3A%2F%2Fwww.savvy.website%2Fog&screenshot=true&meta=false&embed=screenshot.url&viewport.width=1200&viewport.height=630&viewport.deviceScaleFactor=2&type=png" -o assets/og-raw.png
        sips -Z 1200 assets/og-raw.png --out assets/og.png && rm assets/og-raw.png
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-canvas: #fbf8f2;
        --ink-primary: #0d1f1c;
        --ink-secondary: #4a5854;
        --ink-tertiary: #8a938f;
        --hairline: rgba(13, 31, 28, 0.08);
        --grad: linear-gradient(135deg, #5b47e5 0%, #8b5bd4 50%, #d8479a 100%);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      .card {
        width: 1200px;
        height: 630px;
        position: relative;
        overflow: hidden;
        background: var(--bg-canvas);
        color: var(--ink-primary);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        font-feature-settings: "ss01", "cv11";
        -webkit-font-smoothing: antialiased;
      }
      .glow::before,
      .glow::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        filter: blur(70px);
      }
      .glow::before {
        width: 620px;
        height: 620px;
        background: radial-gradient(circle, #eee9fb 0%, transparent 70%);
        top: -220px;
        right: -120px;
        opacity: 0.85;
      }
      .glow::after {
        width: 460px;
        height: 460px;
        background: radial-gradient(circle, #fbe9f1 0%, transparent 70%);
        bottom: -200px;
        left: -120px;
        opacity: 0.7;
      }

      /* Two project frames, fanned into a stack and bleeding off the right edge */
      .frame {
        position: absolute;
        width: 440px;
        border-radius: 14px;
        overflow: hidden;
        background: #fff;
        border: 1px solid var(--hairline);
        box-shadow: 0 40px 80px -30px rgba(13, 31, 28, 0.45),
          0 12px 30px -16px rgba(91, 71, 229, 0.35);
      }
      .frame.campster {
        top: 60px;
        right: 70px;
        transform: rotate(4deg);
        z-index: 1;
      }
      .frame.haka {
        top: 250px;
        right: -44px;
        transform: rotate(-5deg);
        z-index: 2;
      }
      .bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 12px;
        background: #f5f1e8;
        border-bottom: 1px solid var(--hairline);
      }
      .bar i {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #d9d3c7;
        display: block;
      }
      .bar .u {
        margin: 0 auto;
        font-size: 11px;
        color: var(--ink-tertiary);
        background: var(--bg-canvas);
        border-radius: 9999px;
        padding: 3px 11px;
      }
      .frame img {
        display: block;
        width: 100%;
      }

      .content {
        position: relative;
        z-index: 5;
        height: 100%;
        padding: 58px 64px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .mark {
        width: 52px;
        height: 52px;
        border-radius: 13px;
        display: block;
        box-shadow: 0 8px 20px -8px rgba(91, 71, 229, 0.5);
      }
      .wordmark {
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .tld {
        color: var(--ink-tertiary);
        font-weight: 600;
      }
      .eyebrow {
        display: inline-block;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #5b47e5;
        margin-bottom: 18px;
      }
      h1 {
        margin: 0;
        max-width: 540px;
        font-size: 62px;
        line-height: 1.04;
        letter-spacing: -0.025em;
        font-weight: 700;
      }
      .sub {
        margin: 20px 0 0;
        max-width: 500px;
        font-size: 23px;
        line-height: 1.42;
        color: var(--ink-secondary);
      }
      .by {
        font-size: 18px;
        font-weight: 600;
        color: var(--ink-secondary);
      }
      .grad {
        background-image: var(--grad);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="glow"></div>

      <div class="frame campster">
        <div class="bar">
          <i></i><i></i><i></i>
          <span class="u">campster.savvy.website</span>
        </div>
        <img src="/assets/campster.jpg" alt="" />
      </div>
      <div class="frame haka">
        <div class="bar">
          <i></i><i></i><i></i>
          <span class="u">hakadecks.com</span>
        </div>
        <img src="/assets/hakadecks.jpg" alt="" />
      </div>

      <div class="content">
        <div class="brand">
          <svg class="mark" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="m" x1="6" y1="6" x2="114" y2="114" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#5B47E5" />
                <stop offset="0.5" stop-color="#8B5BD4" />
                <stop offset="1" stop-color="#D8479A" />
              </linearGradient>
            </defs>
            <rect x="6" y="6" width="108" height="108" rx="26" fill="url(#m)" />
            <text x="60" y="60" fill="#fff" font-family="Inter, sans-serif" font-size="62" font-weight="800" letter-spacing="-2" text-anchor="middle" dominant-baseline="central">S</text>
          </svg>
          <span class="wordmark"><span class="grad">savvy</span><span class="tld">.website</span></span>
        </div>

        <div>
          <span class="eyebrow">Selected work</span>
          <h1>Websites we've <span class="grad">built</span>.</h1>
          <p class="sub">A showcase of the websites &amp; projects HelloSavvy builds.</p>
        </div>

        <div class="by">Built by <span class="grad">HelloSavvy</span></div>
      </div>
    </div>
  </body>
</html>
